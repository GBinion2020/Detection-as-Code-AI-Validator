rule_id: Credential_Tool_Download_Example
name: Credential Tool Download Example
description: >
  Example rule showing the repository's preferred style for detecting a focused
  PowerShell or CMD credential-access behavior with direct field matching.
type: query
language: kuery

query: |
  (process.args: "powershell.exe" or process.args: "cmd.exe") and
  (message: "IEX" or message: "IWR") and
  message: "raw.githubusercontent.com" and
  message: "PasswordVaultCredentials"

index:
  - .ds-logs-endpoint.events.process-*
  - .ds-logs-windows.sysmon-*
  - .ds-logs-system.security-*
  - .ds-logs-windows.powershell-*
  - logs-*
  - .ds-logs*

severity: high
risk_score: 70

enabled: true

tags:
  - attack.credential_access
  - attack.t1555
  - example

references:
  - https://attack.mitre.org/techniques/T1555/

author:
  - Gabriel_binion
version: 1.0
